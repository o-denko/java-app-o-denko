name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize]
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build-and-test:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install dependencies
        run: mvn compile

      - name: Build project
        run: mvn package -DskipTests

      - name: Run unit tests
        run: mvn test